<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Proyectos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="principal.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <style>
        .btn-primary {
            background-color: #21BFE6;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #0fa3c8;
            transform: translateY(-5px);
        }
        .btn-secondary {
            background-color: #fbf8d9;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: #fffdea;
            transform: translateY(-5px);
        }

    </style>
</head>
<body>
    <nav class="navbar-modern">
        <button class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="navbar-container" id="navbarContainer">
            <a href="index.html" class="nav-link">Home</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="services.html" class="nav-link">Services</a>
            <a href="menuproyectos.html" class="nav-link active">Projects</a>
            <a href="contact.html" class="nav-link">Contact</a>
        </div>
    </nav>
    <section class="panel panel1">
        <div class="container text-center" data-aos="fade-up">
                            <h1 class="display-4 font-angelica gallery-title">My Projects</h1>
                        </div>
    </section>
    
    <section class="panel panel2">
        <div class="container text-center d-flex flex-column justify-content-center align-items-center">
            <h1 class="mb-4">Photography <br> ·༻𐫱༺·</h1>
            <a href="menufoto.html" class="btn btn-primary btn-lg">View Projects</a>
        </div>
    </section>
    <section class="panel panel3">
        <div class="container text-center d-flex flex-column justify-content-center align-items-center">
            <h1 class="mb-4" style="color: aliceblue;">Art <br> ·༻𐫱༺·</h1>
            <a href="menuarte.html" class="btn btn-secondary btn-lg" style="color: black;">View Projects</a>
        </div>
    </section>
    <section class="panel panel4">
        <div class="container text-center d-flex flex-column justify-content-center align-items-center">
            <h1 class="mb-4">Coding <br> ·༻𐫱༺·</h1>
            <a href="menucoding.html" class="btn btn-primary btn-lg">View Projects</a>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
         AOS.init();
         
         // Menu Hamburguesa
         const hamburger = document.getElementById('hamburger');
         const navbarContainer = document.getElementById('navbarContainer');
         
         hamburger.addEventListener('click', function() {
             navbarContainer.classList.toggle('active');
             hamburger.classList.toggle('active');
         });
         
         // Cerrar menú al hacer clic en un enlace
         document.querySelectorAll('.nav-link').forEach(link => {
             link.addEventListener('click', function() {
                 navbarContainer.classList.remove('active');
                 hamburger.classList.remove('active');
             });
         });
    </script>
</body>
</html>
