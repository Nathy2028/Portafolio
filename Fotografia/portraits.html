    <!-- Modal para ver imagen en grande -->
    <div class="modal-lightbox" id="modalLightbox">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <img id="modalImage" src="" alt="Imagen ampliada">
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script async src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../js/animations.js"></script>
    <script>
         
         hamburger.addEventListener('click', function() {
             navbarContainer.classList.toggle('active');
             hamburger.classList.toggle('active');
         });
         
         // Cerrar menú al hacer clic en un enlace
         document.querySelectorAll('.nav-link').forEach(link => {
             link.addEventListener('click', function() {
                 navbarContainer.classList.remove('active');
                 hamburger.classList.remove('active');
             });
         });

         // Lightbox para ver imágenes en grande
         const modalLightbox = document.getElementById('modalLightbox');
         const modalImage = document.getElementById('modalImage');
         const modalClose = document.getElementById('modalClose');
         const galleryImages = document.querySelectorAll('.gallery-img');
         
         // Array con las imágenes de la galería
         const imageArray = Array.from(galleryImages).map(img => img.src);
         let currentImageIndex = 0;

         galleryImages.forEach((img, index) => {
             img.addEventListener('click', function() {
                 modalImage.src = this.src;
                 currentImageIndex = index;
                 modalLightbox.classList.add('active');
             });
         });

         modalClose.addEventListener('click', function() {
             modalLightbox.classList.remove('active');
         });

         modalLightbox.addEventListener('click', function(e) {
             if (e.target === modalLightbox) {
                 modalLightbox.classList.remove('active');
             }
         });
         
         // Navegar con flechas del teclado
         document.addEventListener('keydown', function(e) {
             if (modalLightbox.classList.contains('active')) {
                 if (e.key === 'ArrowRight') {
                     currentImageIndex = (currentImageIndex + 1) % imageArray.length;
                     modalImage.src = imageArray[currentImageIndex];
                 } else if (e.key === 'ArrowLeft') {
                     currentImageIndex = (currentImageIndex - 1 + imageArray.length) % imageArray.length;
                     modalImage.src = imageArray[currentImageIndex];
                 } else if (e.key === 'Escape') {
                     modalLightbox.classList.remove('active');
                 }
             }
         });
    </script>
